<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartix Dashboard</title>
</head>
<body>
  <header class="header">
  <h1>Mobile ERP Dashboard</h1>
  <p>Sales • Stock • Inventory Management</p>
</header>

<div class="stats">
  <div class="card">
    <h3>Total Products</h3>
    <span id="totalProducts">0</span>
  </div>

  <div class="card">
    <h3>Total Sales</h3>
    <span id="totalSales">0</span>
  </div>
</div>

  <input type="text" id="productName" placeholder="Product Name" />
  <input type="number" id="productSales" placeholder="Sales Qty" />
  <button onclick="addProduct()">Add Product</button>

  <div id="output"></div>

  <script src="./script.js"></script>
</body>
</html>
