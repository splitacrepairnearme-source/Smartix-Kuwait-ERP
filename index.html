<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qivenza Dashboard</title>
</head>
<body>
  <header class="header">
    <h1>Qivenza</h1>
   <p>Your Smart Business AI</p>
  </header>
<div class="top-actions">
    <button id="aiChatBtn">🤖 Qivenza AI</button>
    <button id="languageBtn">🌐 Language</button>
</div>

  <div class="stats">
    <div class="card">
      <h3>Total Products</h3>
      <span id="totalProducts">0</span>
    </div>

    <div class="card">
      <h3>Total Sales</h3>
      <span id="totalSales">0</span>
    </div>

    <div class="card">
      <h3>Low Stock</h3>
      <span id="lowStockCount">0</span>
    </div>
  </div>

  <div class="form-box">
    <input type="text" id="productName" placeholder="Product Name" />
    <input type="number" id="productSales" placeholder="Sales Qty" />
    <input type="number" id="productStock" placeholder="Stock Qty" />
    <button id="submitBtn" onclick="addProduct()">Add Product</button>
    <button id="cancelEditBtn" class="secondary-btn" onclick="cancelEdit()" style="display:none;">Cancel</button>
  </div>
<div class="ai-chat-box">
    <h3>🤖 Qivenza AI Assistant</h3>

    <textarea id="aiQuestion" placeholder="Ask anything about your business..."></textarea>

    <button id="askAI">Ask Qivenza AI</button>

    <div id="aiAnswer"></div>
</div>

  <input type="text" id="searchBox" placeholder="🔍 Search product..." oninput="renderProducts()" />

  <div id="output"></div>

  <script src="./script.js"></script>
</body>
</html>
